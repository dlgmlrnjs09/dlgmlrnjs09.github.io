<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>dlgmlrnjs09 Pages</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f7f4;
        --panel: rgba(255, 255, 255, 0.94);
        --line: rgba(21, 61, 38, 0.12);
        --text: #163422;
        --muted: #53705e;
        --accent: #1c7c54;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(28, 124, 84, 0.16), transparent 32%),
          linear-gradient(180deg, #eef6f1 0%, #f7faf8 100%);
      }

      main {
        max-width: 880px;
        margin: 0 auto;
        padding: 72px 24px 96px;
      }

      .hero {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 28px;
        padding: 32px;
        box-shadow: 0 24px 60px rgba(20, 54, 36, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(34px, 6vw, 54px);
        line-height: 1.02;
      }

      p {
        margin: 0;
        line-height: 1.7;
        color: var(--muted);
        font-size: 16px;
      }

      .section {
        margin-top: 24px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 24px;
      }

      .link-card {
        display: block;
        margin-top: 14px;
        padding: 18px 20px;
        border-radius: 18px;
        border: 1px solid rgba(28, 124, 84, 0.16);
        background: linear-gradient(180deg, rgba(28, 124, 84, 0.08), rgba(28, 124, 84, 0.03));
        color: inherit;
        text-decoration: none;
      }

      .link-card strong {
        display: block;
        font-size: 18px;
        margin-bottom: 6px;
      }

      .link-card span {
        color: var(--accent);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>Policy Pages</h1>
        <p>Chrome Web Store 제출 등에 필요한 공개 문서를 이 페이지에서 제공합니다.</p>
      </section>

      <section class="section">
        <p>현재 공개된 문서</p>
        <a class="link-card" href="/molraeviewer/privacy-policy.html">
          <strong>MolraeViewer Privacy Policy</strong>
          <span>https://dlgmlrnjs09.github.io/molraeviewer/privacy-policy.html</span>
        </a>
      </section>
    </main>
  </body>
</html>
